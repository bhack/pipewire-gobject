[library]
version = "0.3.2"
description = "Experimental GObject Introspection wrapper for PipeWire"
authors = "pipewire-gobject contributors"
license = "MIT"
browse_url = "https://github.com/bhack/pipewire-gobject"
repository_url = "https://github.com/bhack/pipewire-gobject.git"
website_url = "https://github.com/bhack/pipewire-gobject"
docs_url = "https://bhack.github.io/pipewire-gobject/"
dependencies = [
  "GObject-2.0",
  "Gio-2.0",
]

[dependencies."GObject-2.0"]
name = "GObject"
description = "The base type system library"
docs_url = "https://docs.gtk.org/gobject/"

[dependencies."Gio-2.0"]
name = "Gio"
description = "GNOME platform I/O and application support library"
docs_url = "https://docs.gtk.org/gio/"

[theme]
show_index_summary = true
show_class_hierarchy = true

[source-location]
base_url = "https://github.com/bhack/pipewire-gobject/blob/main/"
file_format = "{filename}#L{line}"

[extra]
content_files = [
  "getting-started.md",
  "main-loop-and-registry.md",
  "pipewire-version-policy.md",
]

[check]
ignore_deprecated = false
